# This workflow validates commits and pull requests without publishing anything.

name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  compatibility-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.9"
          - "3.12"
          - "3.13"

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: python -m pip install --upgrade pytest

      - name: Run Python compatibility tests
        run: PYTHONPATH=python pytest tests -q

  package-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install test and build dependencies
        run: python -m pip install --upgrade build pytest twine

      - name: Install Node dependencies
        run: npm ci

      - name: Run Python tests
        run: PYTHONPATH=python pytest tests -q

      - name: Check bundled chat UI
        run: npm run check:chat

      - name: Build distributions
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Smoke test built distributions
        run: |
          python - <<'PY'
          import os
          import subprocess
          import sys
          import tempfile
          import venv
          from pathlib import Path

          artifacts = [
              next(Path("dist").glob("utopic-*.whl")),
              next(Path("dist").glob("utopic-*.tar.gz")),
          ]

          for artifact in artifacts:
              with tempfile.TemporaryDirectory() as tmp:
                  root = Path(tmp)
                  venv_dir = root / "venv"
                  home = root / "utopic-home"
                  venv.EnvBuilder(with_pip=True).create(venv_dir)

                  python = venv_dir / ("Scripts/python.exe" if os.name == "nt" else "bin/python")
                  bin_dir = venv_dir / ("Scripts" if os.name == "nt" else "bin")
                  utopic = bin_dir / ("utopic.exe" if os.name == "nt" else "utopic")

                  subprocess.run([str(python), "-m", "pip", "install", str(artifact)], check=True)

                  smoke_env = dict(os.environ, UTOPIC_HOME=str(home))
                  commands = [
                      [str(python), "-m", "utopic", "--help"],
                      [str(python), "-m", "utopic", "--version"],
                      [str(utopic), "--help"],
                      [str(utopic), "--version"],
                      [str(utopic), "chat", "--help"],
                      [str(utopic), "chat", "--version"],
                      [str(utopic), "models", "list"],
                      [str(utopic), "run", "--help"],
                      [str(utopic), "run", "--no-setup", "--help"],
                      [str(utopic), "setup", "--dry-run", "--jobs", "1"],
                  ]

                  for command in commands:
                      completed = subprocess.run(
                          command,
                          env=smoke_env,
                          text=True,
                          stdout=subprocess.PIPE,
                          stderr=subprocess.PIPE,
                      )
                      if completed.returncode != 0:
                          print(f"Command failed: {' '.join(command)}", file=sys.stderr)
                          print(completed.stdout, file=sys.stderr)
                          print(completed.stderr, file=sys.stderr)
                          sys.exit(completed.returncode)
          PY

      - name: Audit distributions
        run: |
          python - <<'PY'
          import sys
          import tarfile
          import zipfile
          from pathlib import Path

          dist = Path("dist")
          sdist = next(dist.glob("utopic-*.tar.gz"))
          wheel = next(dist.glob("utopic-*.whl"))

          blocked_parts = {"tests", "node_modules", ".pytest_cache", "__pycache__"}
          blocked_suffixes = ("node/utopic-chat.ts",)

          def blocked(name: str) -> bool:
              parts = set(Path(name).parts)
              return bool(parts & blocked_parts) or name.endswith(blocked_suffixes)

          with tarfile.open(sdist) as archive:
              sdist_names = archive.getnames()
          with zipfile.ZipFile(wheel) as archive:
              wheel_names = archive.namelist()

          offenders = [name for name in sdist_names + wheel_names if blocked(name)]
          if offenders:
              print("Distributions contain files that should not ship:", file=sys.stderr)
              for name in offenders:
                  print(f"  {name}", file=sys.stderr)
              sys.exit(1)

          required_sdist = [
              "python/utopic/installer.py",
              "python/utopic/models.json",
              "python/utopic/native/CMakeLists.txt",
              "python/utopic/node/utopic-chat.js",
          ]
          required_wheel = [
              "utopic/installer.py",
              "utopic/models.json",
              "utopic/native/CMakeLists.txt",
              "utopic/node/utopic-chat.js",
          ]

          missing = []
          for suffix in required_sdist:
              if not any(name.endswith(suffix) for name in sdist_names):
                  missing.append(f"sdist:{suffix}")
          for name in required_wheel:
              if name not in wheel_names:
                  missing.append(f"wheel:{name}")

          if missing:
              print("Distributions are missing runtime files:", file=sys.stderr)
              for name in missing:
                  print(f"  {name}", file=sys.stderr)
              sys.exit(1)
          PY
