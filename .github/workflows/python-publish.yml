# This workflow validates release artifacts manually and uploads them to PyPI
# only when a GitHub release is published.

name: Upload Python Package

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  compatibility-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.9"
          - "3.12"
          - "3.13"

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install test dependencies
        run: python -m pip install --upgrade pytest

      - name: Run Python compatibility tests
        run: PYTHONPATH=python pytest tests -q

  release-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install test and build dependencies
        run: python -m pip install --upgrade build pytest twine uv

      - name: Install Node dependencies
        run: npm ci

      - name: Run Python tests
        run: PYTHONPATH=python pytest tests -q

      - name: Check bundled chat UI
        run: npm run check:chat

      - name: Build release distributions
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Audit release distributions
        run: |
          python - <<'PY'
          import sys
          import tarfile
          import zipfile
          from pathlib import Path

          dist = Path("dist")
          sdist = next(dist.glob("utopic-*.tar.gz"))
          wheel = next(dist.glob("utopic-*.whl"))

          blocked_parts = {"tests", "node_modules", ".pytest_cache", "__pycache__"}
          blocked_suffixes = ("node/utopic-chat.ts",)

          def blocked(name: str) -> bool:
              parts = set(Path(name).parts)
              return bool(parts & blocked_parts) or name.endswith(blocked_suffixes)

          with tarfile.open(sdist) as archive:
              sdist_names = archive.getnames()
          with zipfile.ZipFile(wheel) as archive:
              wheel_names = archive.namelist()

          offenders = [name for name in sdist_names + wheel_names if blocked(name)]
          if offenders:
              print("Release distributions contain files that should not ship:", file=sys.stderr)
              for name in offenders:
                  print(f"  {name}", file=sys.stderr)
              sys.exit(1)

          required_sdist = [
              "python/utopic/installer.py",
              "python/utopic/models.json",
              "python/utopic/native/CMakeLists.txt",
              "python/utopic/node/utopic-chat.js",
          ]
          required_wheel = [
              "utopic/installer.py",
              "utopic/models.json",
              "utopic/native/CMakeLists.txt",
              "utopic/node/utopic-chat.js",
          ]

          missing = []
          for suffix in required_sdist:
              if not any(name.endswith(suffix) for name in sdist_names):
                  missing.append(f"sdist:{suffix}")
          for name in required_wheel:
              if name not in wheel_names:
                  missing.append(f"wheel:{name}")

          if missing:
              print("Release distributions are missing runtime files:", file=sys.stderr)
              for name in missing:
                  print(f"  {name}", file=sys.stderr)
              sys.exit(1)
          PY

      - name: Smoke test built distributions
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          import sys
          import tempfile
          import textwrap
          import threading
          import venv
          from http.server import BaseHTTPRequestHandler, HTTPServer
          from pathlib import Path

          wheel = next(Path("dist").glob("utopic-*.whl"))
          sdist = next(Path("dist").glob("utopic-*.tar.gz"))

          def smoke_node_free_chat_fallback(utopic: Path, smoke_env: dict[str, str]) -> None:
              class FakeChatHandler(BaseHTTPRequestHandler):
                  def log_message(self, *args: object) -> None:
                      pass

                  def do_GET(self) -> None:
                      self.send_response(200 if self.path == "/health" else 404)
                      self.end_headers()
                      self.wfile.write(b"{}")

                  def do_POST(self) -> None:
                      length = int(self.headers.get("content-length", "0"))
                      payload = json.loads(self.rfile.read(length) or b"{}")
                      if self.path != "/v1/chat/completions" or payload.get("messages") != [{"role": "user", "content": "hello"}]:
                          self.send_response(400)
                          self.end_headers()
                          return
                      body = json.dumps({"choices": [{"message": {"content": "node-free fallback ok"}}]}).encode()
                      self.send_response(200)
                      self.send_header("content-type", "application/json")
                      self.send_header("content-length", str(len(body)))
                      self.end_headers()
                      self.wfile.write(body)

              server = HTTPServer(("127.0.0.1", 0), FakeChatHandler)
              thread = threading.Thread(target=server.serve_forever, daemon=True)
              thread.start()
              try:
                  fallback_env = dict(smoke_env, PATH="")
                  completed = subprocess.run(
                      [
                          str(utopic),
                          "chat",
                          "--server",
                          f"http://127.0.0.1:{server.server_port}",
                          "--max-tokens",
                          "7",
                      ],
                      env=fallback_env,
                      input="hello\n/exit\n",
                      text=True,
                      stdout=subprocess.PIPE,
                      stderr=subprocess.PIPE,
                      timeout=30,
                  )
              finally:
                  server.shutdown()
                  thread.join(timeout=5)
                  server.server_close()

              if completed.returncode != 0 or "node-free fallback ok" not in completed.stdout:
                  print("Installed Node-free chat fallback smoke failed", file=sys.stderr)
                  print(completed.stdout, file=sys.stderr)
                  print(completed.stderr, file=sys.stderr)
                  sys.exit(completed.returncode or 1)
              if "utopic chat: Node.js was not found; using the built-in Python chat fallback." not in completed.stdout:
                  print("Installed chat did not use the Python fallback", file=sys.stderr)
                  print(completed.stdout, file=sys.stderr)
                  print(completed.stderr, file=sys.stderr)
                  sys.exit(1)

          def smoke(artifact: Path) -> None:
              with tempfile.TemporaryDirectory() as tmp:
                  root = Path(tmp)
                  venv_dir = root / "venv"
                  home = root / "utopic-home"
                  venv.EnvBuilder(with_pip=True).create(venv_dir)

                  python = venv_dir / ("Scripts/python.exe" if os.name == "nt" else "bin/python")
                  bin_dir = venv_dir / ("Scripts" if os.name == "nt" else "bin")
                  utopic = bin_dir / ("utopic.exe" if os.name == "nt" else "utopic")
                  utopic_server = bin_dir / ("utopic-server.exe" if os.name == "nt" else "utopic-server")
                  utopic_mcp = bin_dir / ("utopic-mcp.exe" if os.name == "nt" else "utopic-mcp")
                  utopic_acp = bin_dir / ("utopic-acp.exe" if os.name == "nt" else "utopic-acp")

                  subprocess.run([str(python), "-m", "pip", "install", str(artifact)], check=True)

                  smoke_env = dict(os.environ, UTOPIC_HOME=str(home))
                  commands = [
                      [str(python), "-m", "utopic", "--help"],
                      [str(python), "-m", "utopic", "--version"],
                      [str(utopic), "--help"],
                      [str(utopic), "--version"],
                      [str(utopic), "doctor", "--help"],
                      [str(utopic), "doctor", "--version"],
                      [str(utopic), "setup", "--version"],
                      [str(utopic), "chat", "--help"],
                      [str(utopic), "chat", "--version"],
                      [str(utopic), "models", "--version"],
                      [str(utopic), "models", "list"],
                      [str(utopic), "run", "--help"],
                      [str(utopic), "run", "--no-setup", "--help"],
                      [str(utopic), "run", "--version"],
                      [str(utopic), "run", "--no-setup", "--version"],
                      [str(utopic), "run", "--no-setup"],
                      [str(utopic), "setup", "--dry-run"],
                      [str(utopic_server), "--help"],
                      [str(utopic_server), "--version"],
                      [str(utopic_mcp), "--help"],
                      [str(utopic_mcp), "--version"],
                      [str(utopic_acp), "--help"],
                      [str(utopic_acp), "--version"],
                  ]

                  for command in commands:
                      completed = subprocess.run(
                          command,
                          env=smoke_env,
                          text=True,
                          stdout=subprocess.PIPE,
                          stderr=subprocess.PIPE,
                      )
                      expected = 1 if command[-1] == "--no-setup" else 0
                      if completed.returncode != expected:
                          print(f"Command failed: {' '.join(command)}", file=sys.stderr)
                          print(completed.stdout, file=sys.stderr)
                          print(completed.stderr, file=sys.stderr)
                          sys.exit(completed.returncode)

                  bad_jobs_env = dict(smoke_env, UTOPIC_BUILD_JOBS="fast")
                  completed = subprocess.run(
                      [str(utopic), "setup", "--dry-run"],
                      env=bad_jobs_env,
                      text=True,
                      stdout=subprocess.PIPE,
                      stderr=subprocess.PIPE,
                  )
                  if completed.returncode != 2 or "UTOPIC_BUILD_JOBS must be a positive integer" not in completed.stderr:
                      print("Invalid UTOPIC_BUILD_JOBS did not fail cleanly", file=sys.stderr)
                      print(completed.stdout, file=sys.stderr)
                      print(completed.stderr, file=sys.stderr)
                      sys.exit(completed.returncode or 1)

                  completed = subprocess.run(
                      [str(utopic), "setup", "--dry-run", "--jobs", "2"],
                      env=bad_jobs_env,
                      text=True,
                      stdout=subprocess.PIPE,
                      stderr=subprocess.PIPE,
                  )
                  if completed.returncode != 0:
                      print("--jobs did not override invalid UTOPIC_BUILD_JOBS", file=sys.stderr)
                      print(completed.stdout, file=sys.stderr)
                      print(completed.stderr, file=sys.stderr)
                      sys.exit(completed.returncode)

                  prompt_probe = textwrap.dedent(r'''
          from pathlib import Path
          from utopic import cli

          calls = []
          cli._ensure_setup = lambda enabled=True, binary_name="utopic": calls.append(("setup", enabled, binary_name))
          cli.models.ensure_model = lambda value=None: calls.append(("model", value)) or Path("/models/dream.gguf")
          cli._native.main = lambda name, argv=None: calls.append((name, list(argv or [])))

          code = cli.main(["run", "--model=dream-7b-q4", "--prompt=hello", "--temp=0.1", "--seed=7"])
          expected = [
              ("setup", True, "utopic"),
              ("model", "dream-7b-q4"),
              ("utopic", ["-m", "/models/dream.gguf", "-p", "hello", "--temp", "0.1", "--seed", "7"]),
          ]
          if code not in (0, None) or calls != expected:
              raise SystemExit(f"unexpected run prompt argv normalization: code={code!r} calls={calls!r}")
          ''')
                  completed = subprocess.run(
                      [str(python), "-c", prompt_probe],
                      env=smoke_env,
                      text=True,
                      stdout=subprocess.PIPE,
                      stderr=subprocess.PIPE,
                  )
                  if completed.returncode != 0:
                      print("Installed run prompt normalization smoke failed", file=sys.stderr)
                      print(completed.stdout, file=sys.stderr)
                      print(completed.stderr, file=sys.stderr)
                      sys.exit(completed.returncode)

                  smoke_node_free_chat_fallback(utopic, smoke_env)

          smoke(wheel)
          smoke(sdist)
          PY

      - name: Smoke test uv tool install
        run: |
          python - <<'PY'
          import os
          import subprocess
          import sys
          import tempfile
          from pathlib import Path

          with tempfile.TemporaryDirectory() as tmp:
              root = Path(tmp)
              tool_dir = root / "tools"
              bin_dir = root / "bin"
              home = root / "utopic-home"
              env = dict(
                  os.environ,
                  UV_TOOL_DIR=str(tool_dir),
                  UV_TOOL_BIN_DIR=str(bin_dir),
                  UTOPIC_HOME=str(home),
              )

              subprocess.run(
                  [
                      "uv",
                      "tool",
                      "install",
                      "--no-index",
                      "--find-links",
                      "dist",
                      "utopic",
                  ],
                  env=env,
                  check=True,
              )

              exe = bin_dir / ("utopic.exe" if os.name == "nt" else "utopic")
              commands = [
                  [str(exe), "--version"],
                  [str(exe), "chat", "--help"],
                  [str(exe), "models", "list"],
                  [
                      str(exe),
                      "setup",
                      "--backend",
                      "cpu",
                      "--dry-run",
                      "--jobs",
                      "1",
                  ],
              ]

              for command in commands:
                  completed = subprocess.run(
                      command,
                      env=env,
                      text=True,
                      stdout=subprocess.PIPE,
                      stderr=subprocess.PIPE,
                  )
                  if completed.returncode != 0:
                      print(f"Command failed: {' '.join(command)}", file=sys.stderr)
                      print(completed.stdout, file=sys.stderr)
                      print(completed.stderr, file=sys.stderr)
                      sys.exit(completed.returncode)
          PY

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: release-dists
          path: dist/

  pypi-publish:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    needs:
      - compatibility-tests
      - release-build
    permissions:
      # IMPORTANT: this permission is mandatory for trusted publishing
      id-token: write

    # Dedicated environments with protections for publishing are strongly recommended.
    # For more information, see: https://docs.github.com/en/actions/deployment/targeting-different-environments/using-environments-for-deployment#deployment-protection-rules
    environment:
      name: pypi
      url: https://pypi.org/project/utopic/

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v8
        with:
          name: release-dists
          path: dist/

      - name: Check PyPI version availability
        run: |
          python - <<'PY'
          import json
          import sys
          import tarfile
          import urllib.error
          import urllib.request
          import zipfile
          from pathlib import Path

          dist = Path("dist")
          wheel = next(dist.glob("utopic-*.whl"))
          sdist = next(dist.glob("utopic-*.tar.gz"))

          with zipfile.ZipFile(wheel) as archive:
              metadata_name = next(name for name in archive.namelist() if name.endswith(".dist-info/METADATA"))
              wheel_metadata = archive.read(metadata_name).decode("utf-8")

          version = None
          for line in wheel_metadata.splitlines():
              if line.startswith("Version: "):
                  version = line.removeprefix("Version: ").strip()
                  break
          if not version:
              raise SystemExit("Could not determine package version from wheel metadata")

          expected_sdist = f"utopic-{version}"
          with tarfile.open(sdist) as archive:
              top_level = {Path(name).parts[0] for name in archive.getnames() if Path(name).parts}
          if expected_sdist not in top_level:
              raise SystemExit(f"sdist name does not match wheel version {version}: expected {expected_sdist}")

          try:
              with urllib.request.urlopen("https://pypi.org/pypi/utopic/json", timeout=30) as response:
                  releases = json.load(response).get("releases", {})
          except urllib.error.HTTPError as exc:
              if exc.code == 404:
                  releases = {}
              else:
                  raise

          if version in releases:
              print(f"utopic version is already published on PyPI: {version}", file=sys.stderr)
              sys.exit(1)

          print(f"utopic {version} is available for PyPI publishing")
          PY

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
